services:
  # ── Backend (Express API) ──────────────────────────────────────────────────
  - type: web
    name: hp-team-management-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # you fill this in on Render dashboard
      - key: JWT_SECRET
        sync: false   # you fill this in on Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your Static Site URL after it's created
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend (React / Vite static site) ───────────────────────────────────
  - type: web
    name: hp-team-management-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your Web Service URL (e.g. https://hp-team-management-server.onrender.com)
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
