services:
  # ── Single service: Express serves both API + React frontend ──────────────────
  - type: web
    name: hp-team-management-system
    runtime: node
    plan: free
    buildCommand: npx pnpm install --frozen-lockfile=false && cd client && npx pnpm install --frozen-lockfile=false && npx pnpm build && cd ../server && npx pnpm build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
