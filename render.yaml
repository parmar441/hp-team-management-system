services:
  # Single service: Express serves both API + React frontend
  - type: web
    name: hp-team-management-system
    runtime: node
    plan: free
    rootDir: ""
    buildCommand: npx pnpm@9 install --frozen-lockfile=false --production=false && npx pnpm@9 --filter client build && npx pnpm@9 --filter server build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Google OAuth (sign-in). Set these in the Render dashboard.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Public base URL of this service, e.g. https://hp-team-management-system.onrender.com
      # Used to build the OAuth redirect URI. Must match an Authorized redirect URI in Google.
      - key: APP_BASE_URL
        sync: false
